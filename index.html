<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VIDA Liveness Full Mapping Test</title>

  <!-- VIDA SDK -->
  <script src="https://web-sdk.vida.id/1.1.0/sandbox/vida-web-sdk.js?v=9999"></script>

  <style>
    body {
      font-family: Arial;
      padding: 40px;
      background: #f3f5f9;
    }

    button {
      padding: 12px 18px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    #result-box {
      margin-top: 20px;
      padding: 16px;
      border-radius: 8px;
      display: none;
      font-family: monospace;
    }

    .success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #22c55e;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #ef4444;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
    }
  </style>
</head>

<body>

<h2>VIDA Tutorial Mapping Test</h2>
<button onclick="start()">Start Test</button>

<div id="sdk-container"></div>

<!-- Result Display -->
<div id="result-box"></div>

<script>
async function getToken() {
  const res = await fetch("/.netlify/functions/get-token");
  return await res.json();
}

function showResult(type, data) {
  const box = document.getElementById("result-box");
  box.style.display = "block";
  box.className = type === "success" ? "success" : "error";

  const title = type === "success" ? "✅ ON COMPLETE" : "❌ ON ERROR";
  const time = new Date().toLocaleTimeString();

  box.innerHTML = `
    <strong>${title}</strong><br/>
    <small>Time: ${time}</small>
    <hr/>
    <pre>${JSON.stringify(data, null, 2)}</pre>
  `;
}

async function start() {
  document.getElementById("sdk-container").innerHTML = "";
  document.getElementById("result-box").style.display = "none";

  const data = await getToken();

  VidaSDK.init({
  token: data.access_token,
  signingKey: data.signing_key,
  workflow: "liveness",
  elementId: "sdk-container",
  userInfo: {
    id: "test-user",
  }

    locale: "EN",

    localeConfigs: {
      liveness: {
        EN: {
          livenessTutorial: {
            instructions: {
              // Deprecated
              faceCamera: "TEST faceCamera",
              faceClear: "TEST faceClear",
              singleFace: "TEST singleFace",
              avoidDark: "TEST avoidDark",

              // New
              holdPhoneSteady: "TEST holdPhoneSteady",
              avoidBrightPlace: "TEST avoidBrightPlace",
              avoidGlasses: "TEST avoidGlasses\nBaris kedua",
              faceFullyVisible: "TEST faceFullyVisible\nBaris kedua"
            }
          }
        }
      }
    },

    workflowConfigs: {
      liveness: {
        maxRetryAttempts: 3,
        detectionTimeOut: 90000
      }
    },

    onComplete: (res) => {
      console.log("SUCCESS", res);
      showResult("success", res);
    },

    onError: (err) => {
      console.error("ERROR", err);
      showResult("error", err);
    }
  });
}
</script>

</body>
</html>
