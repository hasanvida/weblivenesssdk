<!DOCTYPE html>

<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>VIDA Liveness Test</title>

  <!-- FORCE reload SDK -->

  <script src="https://web-sdk.vida.id/1.1.0/sandbox/vida-web-sdk.js?v=999"></script>

  <style>
    body {
      margin: 0;
      padding: 40px;
      font-family: Arial;
      background: #f3f5f9;
    }

    button {
      padding: 14px 20px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #sdk-container {
      margin-top: 20px;
      min-height: 400px;
    }
  </style>

</head>

<body>

<h2>VIDA Liveness Instruction Test</h2>

<button onclick="startLiveness()">Start Test</button>

<div id="sdk-container"></div>

<script>
async function getToken() {
  const res = await fetch("/.netlify/functions/get-token");
  return await res.json();
}

async function startLiveness() {
  document.getElementById("sdk-container").innerHTML = "";

  const data = await getToken();

  VidaSDK.init({
    token: data.access_token,
    signingKey: data.signing_key,
    workflow: "liveness",
    elementId: "sdk-container",
    userId: "test-user",
    locale: "ID",

    localeConfigs: {
      livenessTutorial: {
        instructions: {
          avoidGlasses: "point 1 test",
          avoidBrightPlace: "point 2 test"
        }
      }
    },

    workflowConfigs: {
      liveness: {
        maxRetryAttempts: 3,
        detectionTimeOut: 90000
      }
    },

    onComplete: (res) => {
      console.log("SUCCESS", res);
    },

    onError: (err) => {
      console.error("ERROR", err);
    }
  });
}
</script>

</body>
</html>
