<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VIDA Liveness Full Mapping Test</title>

  <!-- Force reload -->

  <script src="https://web-sdk.vida.id/1.1.0/sandbox/vida-web-sdk.js?v=9999"></script>

  <style>
    body {
      font-family: Arial;
      padding: 40px;
      background: #f3f5f9;
    }
    button {
      padding: 12px 18px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>

</head>

<body>

<h2>VIDA Tutorial Mapping Test</h2>
<button onclick="start()">Start Test</button>

<div id="sdk-container"></div>

<script>
async function getToken() {
  const res = await fetch("/.netlify/functions/get-token");
  return await res.json();
}

async function start() {
  document.getElementById("sdk-container").innerHTML = "";

  const data = await getToken();

  VidaSDK.init({
    token: data.access_token,
    signingKey: data.signing_key,
    workflow: "liveness",
    elementId: "sdk-container",
    userId: "test-user",

    // 🔥 MUST BE EN
    locale: "EN",

    localeConfigs: {
      liveness: {
        EN: {
          livenessTutorial: {
            

            instructions: {
              // 🔴 Deprecated ones
              faceCamera: "TEST faceCamera",
              faceClear: "TEST faceClear",
              singleFace: "TEST singleFace",
              avoidDark: "TEST avoidDark",

              // 🟢 New ones (v1.1.0)
              holdPhoneSteady: "TEST holdPhoneSteady",
              avoidBrightPlace: "TEST avoidBrightPlace",
              avoidGlasses: "TEST avoidGlasses",
              faceFullyVisible: "TEST faceFullyVisible 
                baris kedua"
            },

            
          }
        }
      }
    },

    workflowConfigs: {
      liveness: {
        maxRetryAttempts: 3,
        detectionTimeOut: 90000
      }
    },

    onComplete: (res) => console.log("SUCCESS", res),
    onError: (err) => console.error("ERROR", err)
  });
}
</script>

</body>
</html>
